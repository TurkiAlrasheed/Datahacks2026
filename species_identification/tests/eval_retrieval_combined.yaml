    '
- id: dilute_apis_003
  query: how do they make wax
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - wax
  - gland
  - comb
  notes: 'Specific wax-production query. Should retrieve construction-

    related chunk among the 60.

    '
- id: dilute_apis_004
  query: what is royal jelly
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - royal
  - jelly
  - queen
  notes: 'Caste-determination chemistry. Probably in the chunks. If not,

    reclassify.

    '
- id: dilute_apis_005
  query: how do they choose a new queen
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - queen
  - larva
  - swarm
  notes: 'Multi-chunk question - involves swarming AND queen-rearing AND

    larval feeding. Tests whether the retriever finds at least one

    relevant chunk among three plausible neighbourhoods.

    '
- id: dilute_procyon_001
  query: how heavy can a raccoon get
  species_id: Procyon_lotor
  expected: retrieve
  expected_keywords:
  - weight
  - kg
  - lb
  notes: 'Specific weight stats are in description chunks. Multiple weight

    figures across chunks (range, max, regional variation). Right

    chunk should be weight-focused, not range/habitat-focused.

    '
- id: dilute_procyon_002
  query: can they swim
  species_id: Procyon_lotor
  expected: retrieve
  expected_keywords:
  - swim
  - water
  notes: 'Swimming explicitly addressed (5 km/h, several hours). Tests

    whether retrieval grabs the locomotion chunk vs. the dousing-

    food chunk that also mentions water.

    '
