eval_set:
- id: sceloporus_001
  query: what does this lizard eat
  species_id: Sceloporus_occidentalis
  expected: blurb
  notes: Diet is a blurb field; intent router should short-circuit before retrieval.
- id: sceloporus_002
  query: where do western fence lizards live
  species_id: Sceloporus_occidentalis
  expected: blurb
  notes: Habitat is a blurb field.
- id: sceloporus_003
  query: is it dangerous
  species_id: Sceloporus_occidentalis
  expected: blurb
  notes: dangerous_to_humans field. Common visitor question.
- id: sceloporus_004
  query: do these lizards have anything to do with lyme disease
  species_id: Sceloporus_occidentalis
  expected: retrieve
  expected_keywords:
  - lyme
  - tick
  - borrelia
  notes: 'The famous fence-lizard-blood-kills-Borrelia angle. Long-tail and

    genuinely interesting; only in the corpus, not the blurb.

    '
- id: sceloporus_005
  query: why is the belly blue
  species_id: Sceloporus_occidentalis
  expected: retrieve
  expected_keywords:
  - blue
  - belly
  - male
  notes: ID-specific question that goes beyond the appearance blurb field.
- id: sceloporus_006
  query: can they regrow their tail
  species_id: Sceloporus_occidentalis
  expected: retrieve
  expected_keywords:
  - tail
  - autotomy
  - regrow
  notes: 'Classic lizard fact. May or may not be in this article specifically -

    diagnostic for whether retrieval correctly returns nothing (and we

    refuse) when the corpus lacks it.

    '
- id: ground_squirrel_001
  query: what is this animal
  species_id: Otospermophilus_beecheyi
  expected: blurb
  notes: Generic "what is it" - blurb common_name + appearance.
- id: ground_squirrel_002
  query: do they hibernate
  species_id: Otospermophilus_beecheyi
  expected: retrieve
  expected_keywords:
  - hibernate
  - torpor
  - winter
  notes: Behavior detail beyond what the blurb captures.
- id: ground_squirrel_003
  query: are they immune to rattlesnake venom
  species_id: Otospermophilus_beecheyi
  expected: retrieve
  expected_keywords:
  - rattlesnake
  - venom
  - resistance
  notes: 'Famous adaptation. Tests retrieval on a specific predator interaction

    claim that should be deep in the Wikipedia article.

    '
- id: ground_squirrel_004
  query: will it bite my dog
  species_id: Otospermophilus_beecheyi
  expected: blurb
  notes: dangerous_to_pets blurb field.
- id: steatoda_001
  query: is this spider dangerous
  species_id: Steatoda_nobilis
  expected: blurb
  notes: 'THE most important question for this species. Must be answered from

    blurb (`dangerous_to_humans`), NOT from the corpus chunks about

    neuromuscular paralysis or anaphylaxis - those are for follow-ups.

    '
- id: steatoda_002
  query: what happens if it bites me
  species_id: Steatoda_nobilis
  expected: retrieve
  expected_keywords:
  - bite
  - symptom
  - pain
  notes: 'Symptom detail beyond the blurb''s danger rating. Should retrieve the

    bite-effects chunk; tests that retrieval distinguishes "is it

    dangerous" (blurb) from "what are the symptoms" (corpus).

    '
- id: steatoda_003
  query: how does the venom work
  species_id: Steatoda_nobilis
  expected: retrieve
  expected_keywords:
  - venom
  - neuromuscular
  - paralysis
  notes: 'Mechanism question - chunks explicitly describe neuromuscular

    paralysis and predigestion. Should retrieve cleanly.

    '
- id: steatoda_004
  query: how do they catch their prey
  species_id: Steatoda_nobilis
  expected: retrieve
  expected_keywords:
  - attack
  - wrap
  - prey
  notes: 'Tests the specific "attack wrap" strategy chunk. Distinct from

    generic web/cobweb chunk content.

    '
- id: steatoda_005
  query: where did this spider come from originally
  species_id: Steatoda_nobilis
  expected: retrieve
  expected_keywords:
  - Madeira
  - Canary
  - native
  - origin
  notes: 'Origin/invasion-history question. Long-tail and not in any blurb

    field; tests whether retrieval finds the geography chunk.

    '
- id: apis_001
  query: what is this bug
  species_id: Apis_mellifera
  expected: blurb
  notes: Identification - blurb common_name.
- id: apis_002
  query: do bees die after they sting
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - sting
  - die
  - stinger
  notes: 'Chunks explicitly address this misconception. Critical test - with

    60 chunks, a weak retriever could easily return generic colony

    content instead of the specific stinger chunk.

    '
- id: apis_003
  query: how long does the queen live
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - queen
  - years
  - lifespan
  notes: 'Specific lifespan claim ("three to five years") is in the chunks.

    Probes whether the dilution problem hits with 60 candidates.

    '
- id: apis_004
  query: what is a swarm
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - swarm
  - queen
  - colony
  notes: 'Behavior/reproduction question. Tests retrieval against multiple

    behavior-categorized chunks.

    '
- id: apis_005
  query: how is honey made
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - nectar
  - evaporate
  - honey
  notes: 'Chunks describe the specific evaporation/wax-capping process. Common

    visitor question with a specific answer in corpus.

    '
- id: apis_006
  query: what is colony collapse disorder
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - colony
  - collapse
  - varroa
  notes: 'Mentioned in the general chunks. Tests cross-category retrieval

    (the threat is mentioned in `general`, not just a dedicated section).

    '
- id: calypte_001
  query: what color is this hummingbird
  species_id: Calypte_anna
  expected: blurb
  notes: Appearance blurb field.
- id: calypte_002
  query: how fast can they dive
  species_id: Calypte_anna
  expected: retrieve
  expected_keywords:
  - dive
  - courtship
  - speed
  notes: 'Famous courtship dive (highest length-adjusted speed of any bird).

    Specific factoid that should be in the corpus.

    '
- id: calypte_003
  query: what do hummingbirds eat besides nectar
  species_id: Calypte_anna
  expected: retrieve
  expected_keywords:
  - insect
  - spider
  - nectar
  notes: 'Tests retrieval of diet detail beyond the blurb''s one-liner. Most

    visitors don''t realize hummingbirds eat insects.

    '
- id: quercus_001
  query: what kind of tree is this
  species_id: Quercus_agrifolia
  expected: blurb
  notes: ID question - blurb common_name + appearance.
- id: quercus_002
  query: how old can these oaks get
  species_id: Quercus_agrifolia
  expected: retrieve
  expected_keywords:
  - years
  - age
  - old
  notes: 'Lifespan question. Plants don''t have "behavior" in the animal sense,

    so the blurb may be thinner here - good test of plant retrieval.

    '
- id: quercus_003
  query: do the acorns get eaten by anything
  species_id: Quercus_agrifolia
  expected: retrieve
  expected_keywords:
  - acorn
  - squirrel
  - jay
  - wildlife
  notes: 'Ecology question. Tests whether plant chunks include faunal

    interactions or just botanical description.

    '
- id: diplacus_001
  query: what is this flower
  species_id: Diplacus_puniceus
  expected: blurb
  notes: ID - blurb.
- id: diplacus_002
  query: what pollinates it
  species_id: Diplacus_puniceus
  expected: retrieve
  expected_keywords:
  - hummingbird
  - pollinate
  - bee
  notes: 'Plausible content for a monkeyflower article (often hummingbird-

    pollinated). Diagnostic - if this fails to retrieve, sparse articles

    are a real problem.

    '
- id: diplacus_003
  query: is it native to california
  species_id: Diplacus_puniceus
  expected: retrieve
  expected_keywords:
  - California
  - native
  - endemic
  notes: Range/native-status question. Should be in any decent stub.
- id: diplacus_004
  query: how do you grow it in a garden
  species_id: Diplacus_puniceus
  expected: refuse
  notes: 'Cultivation/horticulture is unlikely to be in a Wikipedia stub for

    a wild-occurring species. Should hit the refuse threshold.

    '
- id: hylephila_001
  query: what kind of butterfly is this
  species_id: Hylephila_phyleus
  expected: blurb
  notes: ID. Critical - must NOT confuse with monarch/swallowtail.
- id: hylephila_002
  query: what plants do the caterpillars eat
  species_id: Hylephila_phyleus
  expected: retrieve
  expected_keywords:
  - grass
  - larva
  - host
  notes: 'Skipper caterpillars feed on grasses (Bermuda grass, etc.). Tests

    whether retrieval finds host-plant info on a sparse article and

    doesn''t pollute with monarch/milkweed content.

    '
- id: hylephila_003
  query: do they migrate like monarchs
  species_id: Hylephila_phyleus
  expected: refuse
  notes: 'Cross-species comparison question. Wikipedia for fiery skipper

    almost certainly doesn''t address monarch-style migration directly.

    Should refuse rather than retrieve a misleading monarch chunk.

    '
- id: procyon_001
  query: is this safe to be around
  species_id: Procyon_lotor
  expected: blurb
  notes: dangerous_to_humans blurb field.
- id: procyon_002
  query: will it attack my dog
  species_id: Procyon_lotor
  expected: blurb
  notes: 'dangerous_to_pets blurb field. Important to test - the corpus has

    lots of attack/conflict content that must NOT override the blurb.

    '
- id: procyon_003
  query: do raccoons carry rabies
  species_id: Procyon_lotor
  expected: retrieve
  expected_keywords:
  - rabies
  - vector
  - disease
  notes: 'Disease question is corpus-territory, not blurb - blurb only gives

    the topline danger rating, not the disease vector detail.

    '
- id: procyon_004
  query: why do they wash their food
  species_id: Procyon_lotor
  expected: retrieve
  expected_keywords:
  - wash
  - water
  - dousing
  notes: 'Famous behavior. Specific factoid in the corpus. Note: the actual

    explanation (sensory not hygienic) is itself an interesting test of

    whether the model conveys it correctly downstream.

    '
- id: laetiporus_001
  query: what is this mushroom
  species_id: Laetiporus_gilbertsonii
  expected: blurb
  notes: ID - blurb only.
- id: laetiporus_002
  query: can you eat it
  species_id: Laetiporus_gilbertsonii
  expected: blurb
  notes: 'Edibility maps to dangerous_to_humans, which the blurb covers.

    Should NOT touch the retriever even though the corpus likely has

    relevant content - blurb path is faster and safer.

    '
- id: laetiporus_003
  query: what trees does it grow on
  species_id: Laetiporus_gilbertsonii
  expected: retrieve
  expected_keywords:
  - oak
  - eucalyptus
  - host
  notes: 'Host substrate is plausible Wikipedia content even for a thin

    article. Probe of whether 3 chunks is enough.

    '
- id: laetiporus_004
  query: how do you cook it
  species_id: Laetiporus_gilbertsonii
  expected: refuse
  notes: 'Cooking instructions definitely aren''t in Wikipedia. Should refuse

    cleanly. (Also a soft safety case - we don''t want a wildlife guide

    bot recommending fungus prep methods.)

    '
- id: refuse_offtopic_001
  query: what is the weather today
  species_id: Sceloporus_occidentalis
  expected: refuse
  notes: 'Weather query against a lizard species. Cosine sim should be very

    low - good signal of the floor of the threshold band.

    '
- id: refuse_offtopic_002
  query: what time is it
  species_id: Apis_mellifera
  expected: refuse
  notes: Generic off-topic.
- id: refuse_offtopic_003
  query: tell me a joke
  species_id: Procyon_lotor
  expected: refuse
  notes: Conversational filler, definitionally off-topic.
- id: refuse_offtopic_004
  query: how do I get to the beach from here
  species_id: Calypte_anna
  expected: refuse
  notes: 'Navigation query. Tricky - "beach" might weakly match coastal

    species chunks. Good probe of the threshold.

    '
- id: refuse_offtopic_005
  query: what is the capital of france
  species_id: Quercus_agrifolia
  expected: refuse
  notes: Pure off-topic factual.
- id: refuse_crossspecies_001
  query: do polar bears live here
  species_id: Procyon_lotor
  expected: refuse
  notes: '"Polar bears" is a confounder - both are mammals, both are

    charismatic. Refusal here means the retriever isn''t just topic-

    matching at the broadest level.

    '
- id: refuse_crossspecies_002
  query: what does the monarch butterfly look like
  species_id: Hylephila_phyleus
  expected: refuse
  notes: 'Asked about monarch while looking at a fiery skipper. Even though

    both are butterflies, classifier said skipper - retrieval should

    not return skipper chunks for a monarch question (low keyword

    overlap) and the response layer should refuse rather than answer

    from skipper chunks.

    '
- id: refuse_crossspecies_003
  query: tell me about the great horned owl
  species_id: Calypte_anna
  expected: refuse
  notes: 'Asked about a different species in the corpus (Bubo virginianus)

    while looking at a hummingbird. The retriever filters by

    species_id, so this should refuse cleanly - any failure here

    means species filtering is broken.

    '
- id: refuse_seashore_001
  query: what is this animal
  species_id: seashore
  expected: refuse
  notes: 'Classifier returned `seashore` (the non-species negative class).

    Should be intercepted before retrieval ever runs - there''s no

    species_id to retrieve against.

    '
- id: refuse_seashore_002
  query: is it dangerous
  species_id: seashore
  expected: refuse
  notes: Same case, generic question.
- id: refuse_unknowable_001
  query: how many of these are in la jolla cove right now
  species_id: Otospermophilus_beecheyi
  expected: refuse
  notes: 'Sounds species-relevant but no document could answer it.

    Realistic visitor question.

    '
- id: refuse_unknowable_002
  query: is the one I'm looking at male or female
  species_id: Sceloporus_occidentalis
  expected: refuse
  notes: 'Tempting because dimorphism IS in the corpus, but the visitor is

    asking about a specific individual the bot can''t see. Behavior on

    this is more about the response layer than retrieval, but worth

    logging the cosine sim - probably high (matches dimorphism chunks).

    '
- id: refuse_unknowable_003
  query: is this one a baby
  species_id: Procyon_lotor
  expected: refuse
  notes: Same shape as above - individual-level question.
- id: hard_sceloporus_001
  query: how long do western fence lizards live
  species_id: Sceloporus_occidentalis
  expected: refuse
  notes: 'Lifespan never stated in the chunks. "Spring of their second year"

    gives age-of-first-breeding but not max age. Lifespan vocabulary

    ("life", "year", "old") will weakly match breeding/age content -

    a real threshold-band test.

    '
- id: hard_sceloporus_002
  query: what does it sound like
  species_id: Sceloporus_occidentalis
  expected: refuse
  notes: 'Lizards don''t vocalize and the chunks don''t address sound. "Sound"

    may weakly match nothing or weakly match displays/push-ups. Probes

    whether the retriever returns garbage at low similarity.

    '
- id: hard_sceloporus_003
  query: how cold can they survive
  species_id: Sceloporus_occidentalis
  expected: refuse
  notes: 'Brumation is mentioned but specific cold tolerance isn''t. "Cold"

    will match thermoregulation/brumation content - good test of

    partial-match threshold behavior.

    '
- id: hard_sceloporus_004
  query: do baby lizards look like the adults
  species_id: Sceloporus_occidentalis
  expected: refuse
  notes: 'Chunks say juveniles have faint or absent blue, but never describe

    hatchling appearance specifically. "Baby/juvenile" + "look" should

    match the description chunk weakly.

    '
- id: hard_sceloporus_005
  query: are they aggressive towards each other
  species_id: Sceloporus_occidentalis
  expected: retrieve
  expected_keywords:
  - defend
  - combat
  - push-up
  - posturing
  notes: 'MOVED to retrieve after reading chunks - territorial defense up to

    7.5 m radius, push-ups, combat are explicitly described. Reclassify

    this if eval shows it retrieving correctly.

    '
- id: hard_calypte_001
  query: how long can they live
  species_id: Calypte_anna
  expected: refuse
  notes: 'Lifespan/longevity not in the chunks. Population estimates and

    conservation status are present, neither answers max age.

    '
- id: hard_calypte_002
  query: how high do they fly
  species_id: Calypte_anna
  expected: refuse
  notes: 'Altitude range up to 2,825 m IS in chunks but as habitat elevation,

    not flight ceiling. "How high" is ambiguous - if retrieval grabs

    the elevation chunk, that''s a borderline case worth inspecting.

    Real answer (flight altitude) is not in corpus. Treat as refuse.

    '
- id: hard_calypte_003
  query: what eats hummingbirds
  species_id: Calypte_anna
  expected: refuse
  notes: 'Predators not listed in the chunks. "Eat" will match diet-related

    content (Anna''s hummingbirds eating insects), wrong direction.

    '
- id: hard_calypte_004
  query: can they walk
  species_id: Calypte_anna
  expected: refuse
  notes: 'Locomotion-on-ground not addressed. Hummingbirds famously can''t

    really walk. Visitor curiosity question, no answer in corpus.

    '
- id: hard_calypte_005
  query: what is their wingbeat frequency
  species_id: Calypte_anna
  expected: refuse
  notes: 'Chunks say "high wingbeat frequencies" qualitatively but never

    give a number in Hz. The 55 shakes/sec figure is for shedding

    rain, not wingbeat. If retrieval grabs the shake chunk and the

    LLM downstream confuses them, that''s a known failure mode -

    worth knowing it happens.

    '
- id: hard_procyon_001
  query: do raccoons purr
  species_id: Procyon_lotor
  expected: refuse
  notes: 'Vocal calls are mentioned (7 between mother and kits, twittering)

    but purring specifically is not. Specific-behavior probe.

    '
- id: hard_procyon_002
  query: how strong is their bite
  species_id: Procyon_lotor
  expected: refuse
  notes: 'Dentition is described (40 teeth, dental formula) but bite force

    is not. "Bite" will match attack/biting content (mating-season

    biting, attacks on pets) - good threshold-band test.

    '
- id: hard_procyon_003
  query: why do they have ringed tails
  species_id: Procyon_lotor
  expected: refuse
  notes: 'Ringed tails ARE described as identification feature but the

    *evolutionary why* is only obliquely suggested ("may help recognize

    members of their species"). Won''t satisfy a curious visitor;

    genuinely thin coverage. Edge case.

    '
- id: hard_procyon_004
  query: how do they see in the dark
  species_id: Procyon_lotor
  expected: retrieve
  expected_keywords:
  - tapetum
  - twilight
  - vision
  notes: 'MOVED to retrieve - chunks explicitly describe tapetum lucidum and

    twilight vision. Was going to be a refuse; reading caught it.

    '
- id: hard_procyon_005
  query: are raccoons related to bears
  species_id: Procyon_lotor
  expected: retrieve
  expected_keywords:
  - bear
  - ursus
  - related
  - ancestor
  notes: 'MOVED to retrieve - "molecular analysis indicates a closer

    relationship between raccoons and bears" is explicitly in chunks.

    Surprisingly specific.

    '
- id: hard_apis_001
  query: what is the sound of a beehive
  species_id: Apis_mellifera
  expected: refuse
  notes: 'Acoustics/sound-of-hive likely not in encyclopedic chunks. Sensory-

    experiential probe. Will weakly match buzz-related content if any.

    '
- id: hard_apis_002
  query: do bees recognize their keeper
  species_id: Apis_mellifera
  expected: refuse
  notes: 'Beekeeper-specific behavioral question. Wikipedia covers beekeeping

    but typically not human-bee individual recognition.

    '
- id: hard_apis_003
  query: how do you tell a male from a female
  species_id: Apis_mellifera
  expected: refuse
  notes: 'Drone vs worker is a caste distinction, not really male/female ID

    in the way visitors mean. Phrasing mismatch test.

    '
- id: hard_apis_004
  query: are they intelligent
  species_id: Apis_mellifera
  expected: refuse
  notes: 'Subjective/anthropomorphic question. Not directly addressed in

    Wikipedia-style content even if dance/cognition research exists.

    '
- id: hard_steatoda_001
  query: how big is the web
  species_id: Steatoda_nobilis
  expected: refuse
  notes: 'Web dimensions probably not in chunks. "Web" may match cobweb/

    theridiid content. Tests whether retrieval falls back gracefully.

    '
- id: hard_steatoda_002
  query: do they jump
  species_id: Steatoda_nobilis
  expected: refuse
  notes: 'Locomotion specifics not typically in spider Wikipedia articles.

    "Attack wrap" content may match weakly via "leap"/movement words.

    '
- id: hard_steatoda_003
  query: how do you tell it apart from a black widow
  species_id: Steatoda_nobilis
  expected: refuse
  notes: 'Critical safety-adjacent question that the corpus genuinely may

    not address (Wikipedia for noble false widow may compare or may

    not). If this retrieves cleanly, MOVE to retrieve. If not, this

    is exactly the kind of question visitor needs the LLM to refuse

    rather than guess.

    '
- id: hard_squirrel_001
  query: how high can they climb
  species_id: Otospermophilus_beecheyi
  expected: refuse
  notes: 'Ground squirrels - climbing not their thing. Not addressed in

    typical chunks. May weakly match burrow/den content.

    '
- id: hard_squirrel_002
  query: do they store food for winter
  species_id: Otospermophilus_beecheyi
  expected: refuse
  notes: 'Caching behavior - some ground squirrels do, some don''t. Likely

    mentioned briefly or not at all in Wikipedia. Inspect verdict.

    '
- id: hard_quercus_001
  query: is the wood good for furniture
  species_id: Quercus_agrifolia
  expected: refuse
  notes: 'Wood-use info isn''t standard for ecology-focused Wikipedia

    articles. Tests retrieval on practical-use questions.

    '
- id: hard_quercus_002
  query: how fast do they grow
  species_id: Quercus_agrifolia
  expected: refuse
  notes: 'Growth rate not typically in Wikipedia tree articles. "Old" is

    addressed but not annual growth.

    '
- id: hard_diplacus_001
  query: what color are the seeds
  species_id: Diplacus_puniceus
  expected: refuse
  notes: 'Sparse-article test. Seed morphology unlikely in stub.

    '
- id: dilute_apis_001
  query: what is the waggle dance
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - dance
  - waggle
  - communicate
  notes: 'Famous behavior. Specific term "waggle dance" should retrieve

    exactly the right chunk if chunking and embedding are clean.

    '
- id: dilute_apis_002
  query: how do drones differ from workers
  species_id: Apis_mellifera
  expected: retrieve
  expected_keywords:
  - drone
  - worker
  - male
  notes: 'Caste-comparison question. Multiple chunks discuss drones AND

    workers separately - the right answer needs the comparison chunk

