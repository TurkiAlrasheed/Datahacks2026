blurbs:
  Allograpta_obliqua:
    reviewed: false
    source: wikipedia:Allograpta obliqua
    common_name: oblique streaktail hoverfly
    dangerous_to_humans: no
    dangerous_to_pets: no
    diet: adults pollinate, larvae eat aphids - a sap-sucking insect
    behavior: males have holoptic eyes, females dichoptic
    notable: larvae are important predators of aphids
  Apis_mellifera:
    reviewed: false
    source: wikipedia:Western honey bee
    common_name: Western honey bee
    dangerous_to_humans: no
    dangerous_to_pets: unknown
    size: 40,000-80,000 bees per colony
    appearance: Yellow and brown striped bodies with hairy legs
    habitat: Every continent except Antarctica; adapted to local environments
    diet: Nectar, pollen, honey
    behavior: Eusocial, complex communication through pheromones and waggle dance
    notable: Important model organism in scientific studies
  Artemisia_californica:
    reviewed: false
    source: wikipedia:Artemisia californica
    common_name: California sagebrush
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    diet: pollinators, animals (rarely)
    behavior: provides good cover for smaller birds and other animals; allelopathic, secreting
      chemicals to inhibit other plants
    notable: contains terpenes making it aromatic, used in medicine and rituals by indigenous
      groups
  Bombus_vosnesenskii:
    reviewed: false
    source: wikipedia:Bombus vosnesenskii
    common_name: Yellow-faced bumblebee
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    diet: nectar, pollen, honey
    behavior: Overwintering queen establishes underground colonies; workers assist in foraging
      and incubating brood.
    notable: Has reduced nesting density in urbanized landscapes due to subterranean nesting
      habits affected by impervious substances like pavement.
  Bubo_virginianus:
    reviewed: false
    source: wikipedia:Great horned owl
    common_name: Great horned owl
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    diet: rabbits, hares, rats, mice, voles, skunk, rodents, larger mammals, birds, reptiles,
      amphibians, invertebrates
    behavior: nocturnal, solitary
  Buteo_lineatus:
    reviewed: false
    source: wikipedia:Red-shouldered hawk
    common_name: Red-shouldered hawk
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    diet: small mammals, birds, reptiles, amphibians
    behavior: permanently resident in most of its range; northern birds migrate to central
      Mexico
    notable: main conservation threat is deforestation
  Calypte_anna:
    reviewed: false
    source: wikipedia:Anna's hummingbird
    common_name: Anna's hummingbird
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    size: 9.9-10.9 cm body length, wingspan 12 cm
    appearance: Iridescent bronze-green back, pale grey chest and belly, green flanks; male
      has iridescent crimson-red crown and gorget.
    habitat: Western coastal regions of North America, including residential areas, parks,
      and backyards with feeders and flowering plants.
    diet: Nectar from flowers, small insects, other arthropods
    behavior: Adapted to urban environments; eats flying insects; male's call is scratchy
      and metallic.
    notable: Male has the only red crown among North American hummingbird species.
  Canis_latrans:
    reviewed: false
    source: wikipedia:Coyote
    common_name: Coyote
    dangerous_to_humans: 'no'
    dangerous_to_pets: 'yes'
    size: 8-20 kg (18-44 lb) body weight, 1.0-1.35 m (3 ft 3 in - 4 ft 5 in) total length
    appearance: Light gray and red or fulvous fur, interspersed with black and white; short,
      soft underfur and long, coarse guard hairs.
    habitat: Open plains and arid regions of North America, adaptable to urban environments
    diet: Primarily carnivorous, eating deer, rabbits, hares, rodents, birds, reptiles, amphibians,
      fish, and invertebrates
    behavior: Highly flexible social organization; primarily nocturnal, with a characteristic
      howl that changes rapidly in tone and pitch
    notable: Genetic studies show that most North American wolves contain some level of coyote
      DNA
  Corvus_corax:
    reviewed: false
    source: wikipedia:Common raven
    common_name: Common raven
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    size: 63-65 cm length, 1.47 kg weight
    appearance: All-black passerine bird with little variation in appearance.
    habitat: Found across the Northern Hemisphere; common in various habitats including forests
      and tundras.
    diet: Omnivorous diet including carrion, insects, cereal grains, berries, fruit, small
      animals, nesting birds, and food waste
    behavior: Mate for life; defend territory with mated pair. Young birds may travel in flocks.
    notable: Considered unusually intelligent with notable feats of problem-solving.
  Cotinis_mutabilis:
    reviewed: false
    source: wikipedia:Figeater beetle
    common_name: Figeater beetle
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    diet: fruit, nectar, pollen, sap; larvae eat decomposing organic matter
    behavior: active during daylight hours, congregates in shade to find mates
    notable: can swarm on soft or damaged fruit and eat entire crop
  Cycloneda_sanguinea:
    reviewed: false
    source: wikipedia:Cycloneda sanguinea
    common_name: spotless lady beetle
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    size: 4-6.5 mm long, elytra (wing covers)
    appearance: red, unspotted elytra; white and black marks on head and pronotum are gender-specific
    habitat: plant-dense landscapes in Americas, from southern US to Argentina, eastward to
      Cayman Islands
    diet: aphids, milkweeds, other plants
    behavior: nocturnal behavior not mentioned; pupae have gin trap mechanism for predator
      defense
    notable: pupae can 'bite' predators using a device known as a 'gin trap'
  Danaus_plexippus:
    reviewed: false
    source: wikipedia:Monarch butterfly
    common_name: Monarch butterfly
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    size: 8.9-10.2 cm wingspan
    appearance: black, orange, and white pattern
    habitat: North America to northern South America; worldwide including Hawaii, Australia,
      New Zealand, Spain, and Pacific Islands
    diet: nectar from flowers
    behavior: migrates thousands of miles annually
    notable: annual southward migration from northern and central United States to Florida
      and Mexico
  Dione_vanillae:
    reviewed: false
    source: wikipedia:Gulf fritillary
    common_name: Gulf fritillary
    dangerous_to_humans: 'no'
    dangerous_to_pets: unknown
    size: 6.5-9.5 cm wingspan
    appearance: Deep orange with black streaks, underside brown and speckled with silvery
