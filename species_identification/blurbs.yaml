blurbs:
  Allograpta_obliqua:
    reviewed: true
    source: wikipedia:Allograpta obliqua
    common_name: oblique streaktail hoverfly
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 6-9 mm body length
    apprearance: black and yellow striped abdomen and thorax, clear wings with dark veins, large compound eyes
    habitat: gardens, meadows, agricultural fields across North America
    diet: adults eat nectar and pollen, larvae eat aphids - a sap-sucking insect
    behavior: males have holoptic eyes, females dichoptic
    notable: they are hyperfocused when on a flower, ignoring cameras and fingers getting close
  Apis_mellifera:
    reviewed: true
    source: wikipedia:Western honey bee
    common_name: Western honey bee
    dangerous_to_humans: "mild"
    dangerous_to_pets: "mild"
    size: 12-20 mm body length, 10-20 mm wingspan
    appearance: Dark brown striped bodies with hairy legs
    habitat: Every continent except Antarctica; adapted to local environments
    diet: Nectar, pollen, honey
    behavior: Dirunal, eusocial, complex communication through pheromones and waggle dance
    notable: With 170 odorant receptors, they have a sense of smell 50 times more powerful than a dog
  Artemisia_californica:
    reviewed: true
    source: wikipedia:Artemisia californica
    common_name: California sagebrush
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 1-2 m tall, 1-2 m wide
    appearance: slender, flexible, gray-green fuzzy stems with a fragrant smell 
    habitat: coastal sage scrub, chaparral, and dry foothill communities in western and Baja California
    diet: sunlight, water, nutrients from soil
    behavior: provides good cover for smaller birds and other animals; allelopathic, secreting
      chemicals to inhibit other plants
    notable: contains terpenes making it aromatic, used in medicine and rituals by indigenous
      groups, and was coined the cowboy cologne
  Bombus_vosnesenskii:
    reviewed: true
    source: wikipedia:Bombus vosnesenskii
    common_name: Yellow-faced bumblebee
    dangerous_to_humans: "mild"
    dangerous_to_pets: "mild"
    size: 8-21 mm body length
    appearance: Black body with yellow face and thorax; short, even hair, and a square face
    habitat: coastal areas and meadows in western North America, from British Columbia to California
    diet: nectar and pollen from various plants
    behavior: loud foragers, with a high-pitched buzzing sound
    notable: they pollinate tomatoes better than humans, as they can perform 'buzz pollination' by vibrating their 
      flight muscles to release pollen from flowers
  Bubo_virginianus:
    reviewed: true
    source: wikipedia:Great horned owl
    common_name: Great horned owl
    dangerous_to_humans: "no"
    dangerous_to_pets: "yes"
    size: 43-64 cm length, 91-153 cm wingspan, 1-2.5 kg weight
    appearance: large, mottled gray-brown owl with prominent ear tufts. yellow eyes, and a white patch on the throat
    habitat: wide range of habitats across the Americas, including forests, deserts, swamps, and urban areas
    diet: rabbits, hares, rats, mice, voles; also skunks, rodents, larger mammals, birds, reptiles,
      amphibians, invertebrates
    behavior: nocturnal, solitary
    notable: they have a poor sense of smell, but can hear sounds from 10 miles away and see in much dimmer light than humans
  Buteo_lineatus:
    reviewed: true
    source: wikipedia:Red-shouldered hawk
    common_name: Red-shouldered hawk
    dangerous_to_humans: "no"
    dangerous_to_pets: "yes"
    size: 43-61 cm length, 90-127 cm wingspan, 0.5-1 kg weight
    appearance: reddish-brown underparts, dark and white checkered back and wings,
      long tail with narrow white bands
    habitat: deciduous or mixed deciduous-conifer forests, favoring areas with high canopy closure and close proximity to water, 
      such as swamps, flooded forests, and riparian zone
    diet: small mammals, birds, rabbits, reptiles, amphibians
    behavior: loud, repeating, high-pitched call; pale, crescent-shaped patches near the wingtips when soaring
    notable: known for flying upside down during courtship and sometinmes steal food from other raptors in midair
  Calypte_anna:
    reviewed: true
    source: wikipedia:Anna's hummingbird
    common_name: Anna's hummingbird
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 9.9-10.9 cm body length, 12 cm wingspan, 3-6 g weight
    appearance: Iridescent bronze-green back, pale grey chest and belly, emerald-green feathers; male
      has iridescent crimson-red crown and gorget.
    habitat: Western coastal regions of North America, including residential areas, parks,
      and backyards with feeders and flowering plants.
    diet: Nectar from flowers, small insects, other arthropods
    behavior: Anna's hummingbirds hold their tails still while hovering
    notable: Male has the only red crown among North American hummingbird species.
  Canis_latrans:
    reviewed: true
    source: wikipedia:Coyote
    common_name: Coyote
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 8-23 kg body weight, 1.0-1.35 m total length, 0.6 m standing height
    appearance: Light gray and red or dull-orange fur, interspersed with black and white; short,
      soft underfur and long, coarse guard hairs; bushy, black-tipped tail
    habitat: Open plains and arid regions of North America, adaptable to urban environments
    diet: Primarily carnivorous, eating deer, rabbits, hares, rodents, birds, reptiles, amphibians,
      fish, and invertebrates; adapts to eat fruits and vegetables when necessary
    behavior: opportunistic hunters, may shadow people out of curiosity; primarily nocturnal, with a characteristic
      howl that changes rapidly in tone and pitch, adaptable to various environments
    notable: They can run up to 43 mph, jump over 13 feet, and sometimes form hunting partnerships with badgers;
      known as the "song dog" because they use 11 different sounds to communicate
  Corvus_corax:
    reviewed: true
    source: wikipedia:Common raven
    common_name: Common raven
    dangerous_to_humans: "no"
    dangerous_to_pets: "yes"
    size: 54-69 cm length, 115-150 cm wingspan, 0.7-1.63 kg weight
    appearance: All-black passerine bird with little variation in appearance; heavy, curved beak, shaggy throat feathers;
      larger than a crow, with a more robust bill and wedge-shaped tail
    habitat: Found across the Northern Hemisphere; common in various habitats including forests, tundras, and coastal 
      cliffs, thriving in open landscapes and urban areas.
    diet: Omnivorous diet including carrion, insects, cereal grains, berries, fruit, small
      animals, nesting birds, and food waste
    behavior: They produce a deep, resonant "prruk-prruk" or "gronk" call; deeper than a crow's caw; 
      known for their problem-solving skills and playful nature
    notable: Known to break off twigs to play with other ravens; they mate for life, with partners known to serenade each other.
  Cotinis_mutabilis:
    reviewed: true
    source: wikipedia:Figeater beetle
    common_name: Figeater beetle
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 17-34 mm long, 10-19 mm wide, has elytra (wing covers)
    appearance: Velvety, metallic-green back with yellowish or tan margins along the wing covers.
    habitat: southwestern US and Mexico; warm, sunny areas like gardens, orchards, and urban landscapes
    diet: fruit, nectar, pollen, sap; larvae eat decomposing organic matter
    behavior: active during daylight hours, congregates in shade to find mates; makes a buzzing noise similar to small 
      helicopters when flying
    notable: When handled, they might play dead briefly, but they do not bite or sting; they are not particularly skilled fliers 
      and frequently "crash-land" 
  Cycloneda_sanguinea:
    reviewed: true
    source: wikipedia:Cycloneda sanguinea
    common_name: spotless lady beetle
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 4-6.5 mm long, elytra (wing covers)
    appearance: red, unspotted elytra; white and black marks on the head and pronotum
    habitat: plant-dense landscapes in Americas, from southern US to Argentina, eastward to
      Cayman Islands
    diet: aphids (commonly on milkweeds), pollen and nectar
    behavior: dirunal, but attracted to lights; pupae have gin trap mechanism for predator
      defense
    notable: When threatened as adults, they display warning coloration and perform "reflex bleeding," 
      releasing a bitter, sticky yellow fluid from their leg joints toxic to non-human predators
  Danaus_plexippus:
    reviewed: true
    source: wikipedia:Monarch butterfly
    common_name: Monarch butterfly
    dangerous_to_humans: "no"
    dangerous_to_pets: "yes"
    size: 7-12 cm long, 2.5-3.5 cm wingspan
    appearance: vibrant orange wings, bold black veins, and a thick black border filled with small white spots
    habitat: open, sunny areas across North America, like  meadows, grasslands, or urban gardens; worldwide in places
      with milkweed plants like Hawaii, Australia, New Zealand, Spain, and Pacific Islands
    diet: adults feed on nectar from various flowers, while larvae feed exclusively on milkweed leaves
    behavior: migrates thousands of miles annually
    notable: annual southward migration from northern and central United States to Florida
      and Mexico spanning across generations
  Dione_vanillae:
    reviewed: true
    source: wikipedia:Gulf fritillary
    common_name: Gulf fritillary or Passion butterfly
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 2-3 cm long, 6.5-9.5 cm wingspan
    appearance: intense, bright orange with black streaks and spots, underside brown and speckled with silvery
      white dots.
    habitat: Open habitats, moderately sunny areas near open grasslands, parks, woodlands,
      butterfly gardens.
    diet: nectar from flowers, including Lantana plants; larvae feed on passionflower vine leaves
    behavior: preference for brightly colored flowers; fast, direct, and sometimes "rollicking" flight pattern, 
      often seen navigating through gardens at high speed
    notable: the Latin name is Dione vanillae, based on a 1705 painting of a caterpillar sitting on a vanilla plant, but they do not eat vanilla
  Diplacus_puniceus:
    reviewed: true
    source: wikipedia:Diplacus puniceus
    common_name: red bush monkeyflower
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 30-100 cm tall, 60-100 cm wide
    appearance: tubular dark orange to red flowers; narrow, lance-shaped (linear), shiny, dark-green leaves
    habitat: coastal regions of Southern California and Baja California; granite outcrops,
      chaparral openings, open forests, and steep canyon slopes
    diet: none (photosynthesis)
    behavior: none 
    notable: similar to a Venus flytrap, the plant's stigma (center) will close upon being touched
  Encelia_californica:
    reviewed: true
    source: wikipedia:Encelia californica
    common_name: California coast or bush sunflower
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 60-150 cm tall, 90-200 cm wide  
    appearance: Bushy shrub with green, rounded diamond leaves and bright yellow ray florets
      around a center of protruding yellowish to purplish brown disc florets.
    habitat: Southern California; coastal sage plant community at shoreline, chaparral and
      woodlands on inland foothills in Transverse and Peninsular Ranges
    diet: none (photosynthesis)
    behavior: none
    notable: The Tongva people mashed and boiled the leaves, stems, and flowers to create a pain-relieving paste for joints.
  Eriogonum_fasciculatum:
    reviewed: true
    source: wikipedia:Eriogonum fasciculatum
    common_name: California buckwheat
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 0.3-1.8 m tall, 0.3-2.5 m wide
    appearance: small, leathery, needle-like green leaves with woolly undersides that are clustered on stems with 
      dense clusters of white-to-pink flowers that dry to a rusty-red
    diet: none (photosynthesis)
    behavior: none 
    notable: most important native source of honey in California
  Euphorbia_maculata:
    reviewed: true
    source: wikipedia:Euphorbia maculata
    common_name: Spotted Spurge
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 1-10 cm tall, 10-100 cm wide
    appearance: low-growing, prostrate annual weed that forms dense mats; thin, branching, and often reddish or maroon stems that stay 
      close to the ground but spread radially, with oblong, dark green leaves.
    diet: none (photosynthesis)
    behavior: none
    notable: contains triterpenoids with anti-inflammatory and anti-proliferative properties
      when medicinally applied
  Euphorbia_peplus:
    reviewed: true
    source: wikipedia:Euphorbia peplus
    common_name: petty spurge
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 5-30 cm tall, 20 cm wide
    appearance: small, erect annual herb; erect, smooth, often reddish-green stems the base, with leaves that are
      oval-shaped with rounded tips and smooth edges
    diet: none (photosynthesis)
    behavior: none
    notable: has been linked to the virtual elimination of squamous cell skin cancer in Germany
      studies, and has approval from US FDA for treatment of actinic keratosis as a gel containing
      ingenol mebutate
  Euphorbia_serpens:
    reviewed: true
    source: wikipedia:Euphorbia serpens
    common_name: matted sandmat
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 2-5 cm tall, 30-60 cm wide
    appearance: prostrate, mat-forming annual herb with smooth, reddish-green stems; leaves are light green to 
      yellowish-green on top and pale grayish-green underneath oposite, simple, and broadly oval to oblong
    diet: none (photosynthesis)
    behavior: none
    notable: It creeps along the ground like a snake, rooting at its nodes to create dense mats, which is why it is called "creeping spurge"
  Haemorhous_mexicanus:
    reviewed: true
    source: wikipedia:House finch
    common_name: House finch
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 12.5-15 cm long, with a wingspan of 20-25 cm (5-6 in and 8-10 in)
    appearance: Brown or dull-brown color across the back with some shading into deep gray
      on the wing feathers; reddish heads, necks and shoulders in males
    habitat: Urban and suburban areas across North America, as well as various semi-open areas
      in the west from southern Canada to the Mexican state of Oaxaca
    diet: Grains, seeds, berries, weed seeds (nettle and dandelion), small insects (aphids)
    behavior: Forage on the ground or in vegetation; frequent visitors to bird feeders throughout
      the year
    notable: Male plumage ranges from bright crimson to yellow/orange depending on what they eat during their annual molt
  Harmonia_axyridis:
    reviewed: true
    source: wikipedia:Harmonia axyridis
    common_name: Harlequin or Asian lady beetle
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 5.5-8.5mm in length
    appearance: Typical coccinellid beetle, domed with smooth transition between elytra, pronotum,
      and head. Common color form is orange or red with black spots.
    habitat: Native to eastern Asia; introduced to North America, Europe, Africa, and South
      America in greenhouses, crop fields, and gardens.
    diet: Aphids and scale insects
    behavior: Voracious predator; reddish-brown legs and brown underside of abdomen
    notable: While many insects live for a few weeks, these beetles can live up to three years
  Heteromeles_arbutifolia:
    reviewed: true
    source: wikipedia:Heteromeles
    common_name: Toyon
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 2-5 m tall, 2-4 m wide
    appearance: evergreen shrub with leathery, serrated leaves and clusters of small white flowers that develop into bright red berries
    habitat: oak woodland, coastal scrub, and chaparral habitats in California and Baja California
    diet: none (photosynthesis)
    behavior: none
    notable: famously believed to be the namesake of Hollywood, as early settlers named the area after its bright red berries that 
      thrive in the hills, and is now the official city plant of Los Angeles
  Hylephila_phyleus:
    reviewed: true
    source: wikipedia:Fiery skipper
    common_name: Fiery Skipper
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 1-2.5 cm body length
    appearance: Male orange or yellow, female dark brown with pale checkered markings. Small
      brown spots on hindwing and forewing.
    habitat: North and South America, from Canada to Argentina; urban settings, turfgrass,
      Bermuda grass
    diet: Turfgrass, including Bermudagrass, creeping bentgrass, St. Augustine grass
    behavior: Rapid flyers with darting movements; hold wings in a 'triangle' shape to absorb
      sun's rays
    notable: as a caterpillar, it is a master of survival, creating horizontal, silk-lined tunnels at the base of lawn grass that are 
      often too low for lawnmower blades to destroy
  Hyles_lineata:
    reviewed: true
    source: wikipedia:Hyles lineata
    common_name: white-lined sphinx
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 2-3 inch wingspan, 2-3 inches body length
    appearance: Forewing dark brown with tan stripe and white lines. Black hindwing with pink
      median band.
    habitat: open, often degraded, or disturbed landscapes, such as agricultural fields, fields with fireweed, and desert shrublands
    diet: Adults feed on nectar from flowers; caterpillars eat host plants
    behavior: Nocturnal, but also fly during day; prefer flying at dusk and dawn
    notable: Much like actual hummingbirds, these moths have an incredibly fast wingbeat, allowing them to hover in place while feeding
  Junco_hyemalis:
    reviewed: true
    source: wikipedia:Dark-eyed junco
    common_name: Dark-eyed junco
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 5-8 cm body length
    appearance: dark gray head, breast and upperparts; white wing bars in some subspecies
    habitat: boreal forests from Alaska to Newfoundland and south to the Appalachian Mountains;
      wintering throughout most of the United States
    diet: small insects, seeds, and fruits
    behavior: breeds in North American boreal forests; winters in a wide range of habitats
    notable: To survive freezing temperatures, juncos grow approximately 30% more feathers by weight in winter compared to summer
  Laetiporus_gilbertsonii:
    reviewed: true
    source: wikipedia:Laetiporus gilbertsonii
    dangerous_to_humans: "mild"
    dangerous_to_pets: "yes"
    size: 10-40 cm wide, 1-3 cm thick
    appearance: bright orange to salmon pink, with a soft, spongy texture; grows in large, overlapping 
      clusters on tree trunks and branches
    habitat: coastal regions of California and southern Oregon, growing on dead or dying hardwood trees 
      such as oak, eucalyptus, and madrone
    diet: none (photosynthesis)
    behavior: none
    notable: The fiery orange-yellow color fades to a ghostly greyish-white and becomes brittle as it dries out and decays
  Leiothlypis_celata:
    reviewed: true
    source: wikipedia:Orange-crowned warbler
    common_name: Orange-crowned Warbler
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 12-14 cm body length, 20-25 cm wingspan
    appearance: olive-grey upperparts, yellowish underparts with faint streaking and a thin
      pointed bill
    habitat: open shrubby areas across Canada, Alaska and the western United States; migrates
      to southern United States and Central America in winter
    diet: insects, berries and nectar
    behavior: lack of wing bars, strong face marking or bright colouring; builds nest on ground
      under vegetation or low in shrubs
    notable: The orange crown is almost always hidden by olive-yellow feathers and is rarely seen by birders.
  Marah_macrocarpa:
    reviewed: true
    source: wikipedia:Marah macrocarpa
    common_name: wild cucumber
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 1-8 m long vine, 5-20 cm long and 5-6 cm diameter fruit
    appearance: 5-7 lobed green leaves, spiraling tendrils, and small, yellowish-green to white, fragrant flowers 
      that appear in early spring with high-climbing or sprawling, hairy stems that form a net over shrubs in late winter
    habitat: chaparral, coastal sage scrub, oak woodlands, and riparian areas
    diet: none (photosynthesis)
    notable: All parts of the plant are toxic, as it contains cucurbitacins and ribosome-inactivating
      proteins.
  Melospiza_melodia:
    reviewed: true
    source: wikipedia:Song sparrow
    common_name: Song sparrow
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 11-18 cm body length, wingspan 18-25.4 cm
    appearance: Brown upperparts with dark streaks, white underneath with dark streaking and
      a dark brown spot on the breast.
    habitat: Brushland, marshes, salt marshes, suburbs, agricultural fields, roadsides, across
      most of Canada and the United States.
    diet: Insects, seeds, small crustaceans
    behavior: Forages on the ground, in shrubs or very shallow water; nests in sheltered locations
      on the ground or in trees/shrubs
    notable: Males have a repertoire of roughly 5-15 distinct songs, sometimes taking up to 30 minutes to sing through 
      their full, complex playlist
  Nymphalis_antiopa:
    reviewed: true
    source: wikipedia:Nymphalis antiopa
    common_name: Mourning Cloak
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 2-3 inches body length (pupa)
    appearance: Black bodies with reddish-orange dots, black spines and white dots on caterpillars;
      tan or brown gray pupae with red-tipped spikes.
    habitat: Hardwood forests in northern hemisphere, cold mountainous areas
    diet: tree sap (especially oak, willow, and elm), fermenting fruit, dung, and mineral-rich mud 
    behavior: Migrates to Britain during summer and autumn, thought to hibernate in timber
      stacks
    notable: One of the longest lifespans for any butterfly, with a lifespan of 11-12 months
  Omphalotus_olivascens:
    reviewed: true
    source: wikipedia:Omphalotus olivascens
    common_name: Western jack-o'-lantern mushroom
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 5-20 cm wide, 3-10 cm tall, 1-4 cm thick
    appearance: a clustered, orange-to-olive-brown fungus with a convex cap that becomes funnel-shaped with age; true, decurrent 
      gills (running down the stem) that glow with a faint green light in the dark
    habitat: large, dense clusters at the base of hardwood trees - especially oaks and Eucalyptus - or on buried wood and roots along the California coast
    diet: none (photosynthesis)
    behavior: none
    notable: when boiled, this "ghostly" fungus releases a vivid purple dye that can be used on wool and fabrics
  Otospermophilus_beecheyi:
    reviewed: true
    source: wikipedia:California ground squirrel
    common_name: California ground squirrel
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 35-50 cm body length, 13-23 cm tail length, 280-740 g weight
    appearance: grayish-brown fur with white speckles, bushy tail, and a white ring around each eye
    diet: seeds, grains, nuts, fruits, insects, roots
    behavior: hibernate in colder parts of range; active year-round in warmer areas; estivate
      for short periods during hot summers
    notable: When spotting a rattlesnake, a squirrel will increase blood flow to its bushy tail to make it warmer. It then wags the hot tail, appearing larger in the 
      infrared spectrum that rattlesnakes use to detect prey
  Oxalis_pes-caprae:
    reviewed: true
    source: wikipedia:Oxalis pes-caprae
    common_name: African wood-sorrel or Bermuda buttercup
    dangerous_to_humans: "mild"
    dangerous_to_pets: "yes"
    size: 12-45 cm tall, 20-50 cm wide
    appearance: bright yellow, five-petaled flowers with clover-like leaves with occasional distinct purplish or brown dots
    habitat: native to South Africa; invasive in Mediterranean climates worldwide, including California
    diet: none (photosynthesis)
    behavior: none
    notable: contains oxalic acid, which can cause mild symptoms like stomach upset and skin irritation in humans, and more severe symptoms in pets if ingested in large quantities
  Papilio_rutulus:
    reviewed: true
    source: wikipedia:Papilio rutulus
    common_name: Western Tiger Swallowtail
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 4-5.5 cm body length, 7-10 cm wingspan
    appearance: Brightly colored, yellow with black stripes and blue and orange spots near
      tail.
    habitat: Urban parks and gardens, rural woodlands, riparian areas in Western North America.
    diet: Leaves of various trees, including cottonwood, willow, quaking aspen
    behavior: Active butterflies, rarely seen at rest; males congregate near water to drink
      and extract minerals.
    notable: its caterpillars start out looking exactly like bird droppings to deter predators before 
      turning bright green with large "eyespots"
  Paropsis_atomaria:
    reviewed: true
    source: wikipedia:Paropsis atomaria
    common_name: Speckled leaf beetle
    dangerous_to_humans: "no"
    dangerous_to_pets: "no"
    size: 8-14 mm long, 4-5 mm wide
    appearance: Distinctive dome-shaped, oval, and robust light brown, tan, or pale pink-orange body,
      speckled with orange dots and faint black spots
    habitat: Eucalyptus and Corymbia trees, particularly in coastal areas and forests
    diet: eucalyptus and corymbia leaves
    behavior: active during the day, often found on the undersides of leaves; can cause significant damage to eucalyptus trees by skeletonizing the leaves
    notable: The beetle's name, "atomaria," comes from the Latin word for "speckled," referring to the small black speckles on its elytra
  Procyon_lotor:
    reviewed: true
    source: wikipedia:Raccoon
    common_name: Raccoon
    dangerous_to_humans: "yes"
    dangerous_to_pets: "yes"
    size: 40-70 cm body length, 19-40 cm tail length, 2-10 kg weight
    appearance: grayish-brown fur with a distinctive black "mask" around the eyes and a bushy, ringed tail, extremely dexterous front paws
    diet: omnivorous, a mix of plants (berries, nuts, fruits, corn), invertebrates (crayfish, insects), and small vertebrates (frogs, rodents, bird eggs), 
      with human garbage, pet food, and carrion
    behavior: usually nocturnal; they "wash" their food by dipping it in water or rub them together before eating
    notable: can remember solution to tasks for at least three years; are not bothered by falls of 12 to 15 meters.
  Quercus_agrifolia:
    reviewed: true
    source: wikipedia:Quercus agrifolia
    common_name: California live oak
    dangerous_to_humans: "no"
    dangerous_to_pets: "yes"
    size: 7-24 m tall, 5-20 m wide
