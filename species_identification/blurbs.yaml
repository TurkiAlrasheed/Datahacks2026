    diet: none (plant)
    behavior: none noted
    notable: hybridizes with Diplacus ×australis
  Encelia_californica:
    reviewed: false
    source: wikipedia:Encelia californica
    common_name: California coast sunflower
    dangerous_to_humans: 'no'
    dangerous_to_pets: 'no'
    size: 50-150 cm height
    appearance: Bushy shrub with green, rounded diamond leaves and bright yellow ray florets
